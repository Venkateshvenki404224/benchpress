entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    network: benchpress
    exposedByDefault: false

certificatesResolvers:
  letsencrypt:
    acme:
      email: ""
      storage: /etc/traefik/acme/acme.json
      caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      tlsChallenge: {}

api:
  dashboard: true
  insecure: true
